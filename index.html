const embers=[];for(let i=0;i<40;i++)embers.push({x:Math.random()*1024,y:Math.random()*559,s:.3+Math.random()*.8,a:Math.random()});
function birds(t){ctx.fillStyle="#1a1a22";for(let i=0;i<4;i++){let x=((i*260+t*70)%1124)-60,y=40+i*22+Math.sin(t*1.5+i)*10;const up=Math.floor(t*7+i)%2===0;
 if(up){ctx.fillRect(x,y,5,2);ctx.fillRect(x+5,y-3,3,2);ctx.fillRect(x+8,y,5,2);}else{ctx.fillRect(x,y+2,5,2);ctx.fillRect(x+5,y,3,2);ctx.fillRect(x+8,y+2,5,2);}}}
function sign(t){const g=0.55+0.45*Math.sin(t*3.5);ctx.save();ctx.font='900 27px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.shadowColor='rgba(255,150,60,'+g.toFixed(2)+')';ctx.shadowBlur=14;ctx.fillStyle='rgba(120,80,40,'+(0.85*g+0.15).toFixed(2)+')';ctx.letterSpacing='3px';ctx.fillText('TRENCHERS',714,171);ctx.restore();}
function coin(t){const cx=175,cy=200+Math.sin(t*2)*7,p=0.5+0.5*Math.sin(t*3.5);ctx.save();
 ctx.shadowColor='rgba(255,90,38,'+(0.5+0.4*p).toFixed(2)+')';ctx.shadowBlur=22;ctx.fillStyle='#100f0a';ctx.beginPath();ctx.arc(cx,cy,19,0,6.29);ctx.fill();ctx.shadowBlur=0;
 ctx.fillStyle='#c89b4a';ctx.beginPath();ctx.arc(cx,cy,15,0,6.29);ctx.fill();ctx.fillStyle='#e7c87e';ctx.beginPath();ctx.arc(cx,cy-3,12,3.6,5.8);ctx.fill();
 // inner shine ring instead of a letter
